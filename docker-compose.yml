services:
  horolog:
    build: .
    ports:
      - "3000:3000"
    environment:
      AUTH_TOKEN: ${AUTH_TOKEN:?set AUTH_TOKEN in .env}
      HOME_TZ: ${HOME_TZ:-America/Los_Angeles}
      STALE_SESSION_HOURS: ${STALE_SESSION_HOURS:-24}
      # Must match the URL you load the dashboard from, or SvelteKit's CSRF
      # check rejects every form submission ("Cross-site POST ... forbidden").
      ORIGIN: ${ORIGIN:-http://localhost:3000}
    volumes:
      - ./data:/data
    restart: unless-stopped
