# Pin the compose project name so container/volume names don't depend on the
# checkout directory. Don't change it once deployed: the database volume is
# named after it (onwrist_pgdata), and a renamed project starts a fresh one.
name: onwrist

services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: onwrist
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: onwrist
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U onwrist"]
      interval: 5s
      timeout: 5s
      retries: 12
    restart: unless-stopped
  onwrist:
    build: .
    ports:
      # Reachable from your network by default. Hardening for a Cloudflare
      # tunnel on the same host: set BIND_ADDRESS=127.0.0.1 so the tunnel is
      # the only way in (pair it with ADDRESS_HEADER below).
      - "${BIND_ADDRESS:-0.0.0.0}:3000:3000"
    environment:
      DATABASE_URL: postgres://onwrist:${POSTGRES_PASSWORD}@db:5432/onwrist
      SESSION_DAYS: ${SESSION_DAYS:-30}
      APP_NAME: ${APP_NAME:-onwrist}
      # Client IP for the per-IP rate limits. Empty (the default) = use the
      # connecting socket's address — correct whenever clients reach the port
      # directly. Behind a proxy/tunnel every request arrives from the proxy's
      # socket instead, collapsing all visitors into one rate-limit bucket —
      # set the header your proxy guarantees (cloudflared: CF-Connecting-IP)
      # and make the proxy the only path in (BIND_ADDRESS=127.0.0.1 above).
      # Only trust a header your proxy always overwrites: adapter-node 500s
      # if the configured header is missing, and a spoofable one lets clients
      # forge rate-limit identities.
      ADDRESS_HEADER: ${ADDRESS_HEADER:-}
      # adapter-node caps request bodies at 512K by default — far below a
      # phone photo. Governs the photo-upload forms.
      BODY_SIZE_LIMIT: ${BODY_SIZE_LIMIT:-25M}
      # Must match the URL you load the dashboard from, or SvelteKit's CSRF
      # check rejects every form submission ("Cross-site POST ... forbidden").
      ORIGIN: ${ORIGIN:?set ORIGIN in .env}
      # Account emails (verify/reset/change) and signup captcha. Left empty
      # by default so the app still boots without mail/captcha configured —
      # empty RESEND_API_KEY falls back to logging mail to stdout.
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      MAIL_FROM: ${MAIL_FROM:-}
      TURNSTILE_SITE_KEY: ${TURNSTILE_SITE_KEY:-}
      TURNSTILE_SECRET_KEY: ${TURNSTILE_SECRET_KEY:-}
      # Seeds one admin account at boot from this address (idempotent, no-op
      # once an admin exists). Unset ⇒ no admin seeded, /admin stays 404 for
      # everyone.
      ADMIN_EMAIL: ${ADMIN_EMAIL:-}
      # Optional S3-compatible photo storage (Backblaze B2, R2, MinIO...).
      # All five unset (the default) ⇒ photos stay on the ./data bind mount
      # via the fs driver. Set all five to store photos in a PRIVATE bucket
      # instead; partial config fails at boot.
      S3_ENDPOINT: ${S3_ENDPOINT:-}
      S3_REGION: ${S3_REGION:-}
      S3_BUCKET: ${S3_BUCKET:-}
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID:-}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY:-}
    volumes:
      - ./data:/data
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:3000/healthz || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    restart: unless-stopped

volumes:
  pgdata:
