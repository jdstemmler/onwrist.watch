# Pin the compose project name. It must stay "horolog" (historically derived
# from the checkout directory) — changing it would detach the stack from the
# live production resources, most critically the horolog_pgdata volume, and
# `up` would create fresh empty ones.
name: horolog

services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: onwrist
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: onwrist
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U onwrist"]
      interval: 5s
      timeout: 5s
      retries: 12
    restart: unless-stopped
  onwrist:
    build: .
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgres://onwrist:${POSTGRES_PASSWORD}@db:5432/onwrist
      SESSION_DAYS: ${SESSION_DAYS:-30}
      APP_NAME: ${APP_NAME:-onwrist}
      # adapter-node caps request bodies at 512K by default — far below a
      # phone photo. Governs the photo-upload forms.
      BODY_SIZE_LIMIT: ${BODY_SIZE_LIMIT:-25M}
      # Must match the URL you load the dashboard from, or SvelteKit's CSRF
      # check rejects every form submission ("Cross-site POST ... forbidden").
      ORIGIN: ${ORIGIN:?set ORIGIN in .env}
      # Account emails (verify/reset/change) and signup captcha. Left empty
      # by default so the app still boots without mail/captcha configured —
      # empty RESEND_API_KEY falls back to logging mail to stdout.
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      MAIL_FROM: ${MAIL_FROM:-}
      TURNSTILE_SITE_KEY: ${TURNSTILE_SITE_KEY:-}
      TURNSTILE_SECRET_KEY: ${TURNSTILE_SECRET_KEY:-}
      # Seeds one admin account at boot from this address (idempotent, no-op
      # once an admin exists). Unset ⇒ no admin seeded, /admin stays 404 for
      # everyone.
      ADMIN_EMAIL: ${ADMIN_EMAIL:-}
    volumes:
      - ./data:/data
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
