<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta name="text-scale" content="scale" />
		<link rel="manifest" href="/manifest.webmanifest" />
		<link rel="icon" href="/icon-192.png" />
		<link rel="apple-touch-icon" href="/icon-192.png" />
		<meta name="theme-color" content="#131614" />
		<script>
			// Apply the stored theme override before first paint (no flash).
			// Kept inline and dependency-free; the nav toggle writes the same
			// localStorage key and data-theme attribute.
			try {
				var t = localStorage.getItem('theme');
				if (t === 'light' || t === 'dark') document.documentElement.dataset.theme = t;
				var dark =
					t === 'dark' ||
					(t !== 'light' && matchMedia('(prefers-color-scheme: dark)').matches);
				document
					.querySelector('meta[name="theme-color"]')
					.setAttribute('content', dark ? '#131614' : '#eef0ec');
			} catch (e) {}
		</script>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
