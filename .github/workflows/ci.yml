name: CI

# `main` is the trunk, so it gets CI on every push — the release workflow
# refuses to promote a SHA without a passing `test` check. Pushes to
# `production` are deliberately not a trigger: it only ever fast-forwards
# to a main commit CI already passed. Release PRs (main -> production) do
# run, as a last look before shipping.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main, production]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    # Real Postgres for the opt-in concurrency test: PGlite can't interleave
    # two transactions, so without this the FOR UPDATE serialization behind
    # the one-watch-on-wrist invariant is never exercised in CI.
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: onwrist
          POSTGRES_PASSWORD: ci
          POSTGRES_DB: onwrist
        ports:
          - 55432:5432
        options: >-
          --health-cmd "pg_isready -U onwrist"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run check
      - run: npm test
        env:
          RACE_DATABASE_URL: postgres://onwrist:ci@localhost:55432/onwrist
