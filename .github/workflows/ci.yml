name: CI

# Pushes to develop are deliberately not a trigger: every commit reaching
# develop was already tested — feature PRs run CI here (and develop's
# required check is strict/up-to-date), and the sync-develop workflow only
# fast-forwards SHAs that passed CI on main.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    # Real Postgres for the opt-in concurrency test: PGlite can't interleave
    # two transactions, so without this the FOR UPDATE serialization behind
    # the one-watch-on-wrist invariant is never exercised in CI.
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: onwrist
          POSTGRES_PASSWORD: ci
          POSTGRES_DB: onwrist
        ports:
          - 55432:5432
        options: >-
          --health-cmd "pg_isready -U onwrist"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run check
      - run: npm test
        env:
          RACE_DATABASE_URL: postgres://onwrist:ci@localhost:55432/onwrist
